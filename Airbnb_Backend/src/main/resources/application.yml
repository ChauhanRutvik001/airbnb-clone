spring:
  application:
    name: SpringBootTask

  datasource:
    url: jdbc:postgresql://localhost:5432/AirbnbDB
    username: postgres
    password: Chauhan

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  web:
    resources:
      add-mappings: false

  messages:
    basename: messages
    encoding: UTF-8

server:
  port: 8080


logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html